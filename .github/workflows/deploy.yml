name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: {}
  schedule:
    # 06:00 UTC on the 1st of every month — refresh data from PBH
    - cron: "0 6 1 * *"

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyproj shapely

      - name: Fetch data from PBH
        run: python scripts/generate_data.py

      - name: Build GPX files
        run: python scripts/build_gpx.py

      - name: Build street GPX
        run: python scripts/build_streets.py

      - name: Copy assets into site
        run: mkdir -p docs/assets && cp assets/* docs/assets/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
